name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t ghcr.io/tiernebre/make-the-pick:latest \
            .
          docker push ghcr.io/tiernebre/make-the-pick:latest

      - name: Copy docker-compose.prod.yml to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: /opt/make-the-pick/

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/tiernebre/make-the-pick:latest
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE
          script: |
            set -euo pipefail
            cd /opt/make-the-pick

            # Incident 002: fail fast on disk pressure before docker pull
            # wastes bandwidth and leaves orphaned overlay snapshots behind.
            used=$(df --output=pcent / | tail -1 | tr -dc '0-9')
            if [ "$used" -ge 85 ]; then
              echo "Aborting deploy: root FS is ${used}% full (threshold 85%)."
              df -h /
              exit 1
            fi

            docker pull "$IMAGE"
            docker compose -f docker-compose.prod.yml up -d

            # Incident 002: prove the running container is actually on the
            # image we just pushed. A silent no-op recreate (e.g. ENOSPC
            # during extract) would otherwise leave the old container up.
            expected=$(docker image inspect "$IMAGE" --format '{{.Id}}')
            actual=$(docker inspect make-the-pick-app-1 --format '{{.Image}}')
            if [ "$expected" != "$actual" ]; then
              echo "Deploy verification failed: app container is on $actual, expected $expected"
              exit 1
            fi

            # Incident 002: keep the last 24h of images for fast rollback,
            # drop the rest so /var/lib/docker doesn't fill up again. Runs
            # only after the digest check passes so a failed deploy keeps
            # its rollback image intact.
            docker image prune -a -f --filter "until=24h"

      - name: Smoke test
        run: |
          expected="${{ github.sha }}"
          for i in $(seq 1 10); do
            # Incident 002: assert /api/health.commit matches the SHA we
            # just built, not just that _something_ returns 200. The old
            # check-for-200 on / would have passed against a stale
            # container that never received the new image.
            body=$(curl -s https://makethepick.gg/api/health || echo "")
            commit=$(printf '%s' "$body" | jq -r '.commit // empty' 2>/dev/null || echo "")
            if [ "$commit" = "$expected" ]; then
              echo "Health check passed: /api/health.commit = $commit"
              exit 0
            fi
            echo "Attempt $i: commit=$commit expected=$expected body=$body"
            sleep 5
          done
          echo "Health check failed after 10 attempts — deployed code did not reach prod"
          exit 1
