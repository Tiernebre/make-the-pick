name: CI

on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: make_the_pick
          POSTGRES_PASSWORD: make_the_pick
          POSTGRES_DB: make_the_pick
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U make_the_pick"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - run: deno task db:migrate
      - run: deno task test

  e2e:
    name: E2E Tests
    needs: [test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: make_the_pick
          POSTGRES_PASSWORD: make_the_pick
          POSTGRES_DB: make_the_pick_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U make_the_pick"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://make_the_pick:make_the_pick@localhost:5432/make_the_pick_e2e
      DATABASE_URL_E2E: postgres://make_the_pick:make_the_pick@localhost:5432/make_the_pick_e2e
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - name: Run migrations
        run: deno task db:migrate
      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: deno task test:e2e
        env:
          CI: "true"
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
